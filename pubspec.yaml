name: daily_hope
description: App de textos diarios de esperanza y oraciones
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.1
  share_plus: ^10.1.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  screenshot: ^3.0.0
  path_provider: ^2.1.1
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/texts/
    - assets/fonts/
    - assets/images/
    - assets/texts/es_reflections.json
    - assets/texts/en_reflections.json
 
  
  # fonts:
  #   - family: PlayfairDisplay
  #     fonts:
  #       - asset: assets/fonts/PlayfairDisplay-Regular.ttf
  #       - asset: assets/fonts/PlayfairDisplay-Italic.ttf
  #         style: italic
  # Al final del archivo, añade la configuración:
# Configuración del ícono de la app
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#E8DDD0"
  adaptive_icon_foreground: "assets/images/app_logo_transparent.png"

# Configuración del splash screen
flutter_native_splash:
  # Modo claro
  color: "#FAFAFA"
  image: assets/images/app_logo_transparent.png
  
  # Modo oscuro
  color_dark: "#1A1A1A"
  image_dark: assets/images/app_logo_transparent.png
  
  # Android 12+ (modo claro)
  android_12:
    image: assets/images/app_logo_transparent.png
    icon_background_color: "#FAFAFA"
    color: "#B8996A"
    image_dark: assets/images/app_logo_transparent.png
    icon_background_color_dark: "#1A1A1A"
    color_dark: "#B8996A"
  
  # iOS
  image_ios: assets/images/app_logo_transparent.png
  
  # Posicionamiento
  android_gravity: center
  ios_content_mode: center
  fullscreen: true



